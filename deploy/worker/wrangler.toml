name = "atrium"
main = "../../src/index.ts"
compatibility_date = "2024-09-23"

[[routes]]
pattern = "atrium.jihuayu.com"
custom_domain = true

[placement]
mode = "smart"

[vars]
BASE_URL = "https://atrium.jihuayu.com"
TOKEN_CACHE_TTL = "3600"
ACCOUNT_BASE_URL = "https://account.jihuayu.com"
ACCOUNT_AUDIENCE = "atrium"

# test bypass is only for local/CI e2e, do not set in production
# ATRIUM_TEST_BYPASS_SECRET = ""
# set ACCOUNT_INTERNAL_SECRET as a Worker secret when account service enables INTERNAL_API_SECRET

[[d1_databases]]
binding = "DB"
database_name = "atrium-db"
database_id = "fd908a31-1dc2-4e43-aca5-b55823aebeae"
migrations_dir = "../../migrations"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
