name: Run Server and Worker Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - server
          - worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        if: matrix.mode == 'worker'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: python3 scripts/test.py ${{ matrix.mode }}
